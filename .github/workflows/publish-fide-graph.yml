name: Publish Fide Graph

on:
  push:
    tags:
      - "fide-graph/v*"

permissions:
  contents: write
  id-token: write
  deployments: write

jobs:
  publish-fide-graph:
    permissions:
      contents: write
      id-token: write
      deployments: write
    uses: ChrisLally/lally-workflows/.github/workflows/release-publish.yml@main
    with:
      tag_prefix: "fide-graph/v"
      install_working_directory: "packages/graph/sdk/javascript"
      package_dir: "packages/graph/sdk/javascript"
      deployment_environment: "Preview - fide-graph"
